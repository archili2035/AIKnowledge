<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI节点详情</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: rgba(255, 255, 255, 0.92);
            --text: #1f2a44;
            --subtext: #5c6784;
            --border: #d9e1f2;
            --shadow: 0 12px 32px rgba(45, 65, 120, 0.12);
            --shadow-sm: 0 8px 20px rgba(45, 65, 120, 0.08);
            --accent: linear-gradient(135deg, #6a8cff 0%, #8e6cff 100%);
            --accent-solid: #5b6cff;
            --success: #eafaf3;
            --success-text: #1b7f4b;
            --info-bg: #eef4ff;
            --code-bg: #f3f6fc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(122, 162, 255, 0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(158, 108, 255, 0.16), transparent 28%),
                linear-gradient(180deg, #f7f9fd 0%, #eef3fb 100%);
            line-height: 1.75;
        }

        a {
            color: var(--accent-solid);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .hero {
            padding: 56px 20px 36px;
        }

        .hero-card {
            width: min(1100px, 100%);
            margin: 0 auto;
            padding: 30px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(217, 225, 242, 0.92);
            box-shadow: var(--shadow);
        }

        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            color: var(--subtext);
            font-size: 0.9rem;
        }

        .breadcrumb a {
            font-weight: 700;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(106, 140, 255, 0.12);
            color: #4658c8;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .hero h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3.1rem);
            line-height: 1.18;
            letter-spacing: -0.02em;
        }

        .hero p {
            margin: 0;
            color: var(--subtext);
            font-size: 1rem;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(217, 225, 242, 0.95);
            color: #415070;
            font-size: 0.84rem;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
        }

        .pill strong {
            margin-right: 6px;
            color: #2e3f96;
        }

        .container {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto 48px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.65fr) minmax(300px, 0.95fr);
            gap: 22px;
        }

        .panel {
            background: var(--card);
            border: 1px solid rgba(217, 225, 242, 0.9);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .main-panel {
            padding: 28px;
        }

        .sidebar {
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .section-card {
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(220, 228, 246, 0.95);
            box-shadow: var(--shadow-sm);
        }

        .section-card h2,
        .section-card h3 {
            margin: 0 0 10px;
        }

        .section-card h2 {
            font-size: 1.18rem;
        }

        .section-card h3 {
            font-size: 1rem;
            color: #4151b8;
        }

        .section-card p,
        .section-card li,
        .section-card code {
            color: var(--subtext);
            font-size: 0.95rem;
        }

        .section-card ul {
            margin: 0;
            padding-left: 20px;
            display: grid;
            gap: 8px;
        }

        .section-grid {
            display: grid;
            gap: 16px;
        }

        .tag-list,
        .link-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag,
        .link-chip {
            display: inline-flex;
            align-items: center;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.84rem;
            font-weight: 700;
        }

        .tag {
            background: #f2f5fc;
            color: #42506d;
        }

        .link-chip {
            background: rgba(106, 140, 255, 0.12);
            color: #3951c6;
            border: 1px solid rgba(106, 140, 255, 0.18);
        }

        .info-list {
            display: grid;
            gap: 12px;
        }

        .info-item {
            padding: 14px 16px;
            border-radius: 16px;
            background: var(--info-bg);
            border: 1px solid rgba(106, 140, 255, 0.12);
        }

        .info-item strong {
            display: block;
            margin-bottom: 5px;
            color: #3043a0;
            font-size: 0.92rem;
        }

        .source-list,
        .relation-list {
            display: grid;
            gap: 12px;
        }

        .source-item,
        .relation-item {
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(220, 228, 246, 0.95);
        }

        .relation-item strong,
        .source-item strong {
            display: block;
            margin-bottom: 6px;
            color: #2d3f7c;
            font-size: 0.92rem;
        }

        .relation-item p,
        .source-item p {
            margin: 0;
            color: var(--subtext);
            font-size: 0.9rem;
        }

        .status-box {
            padding: 18px 20px;
            border-radius: 20px;
            background: var(--success);
            color: var(--success-text);
            border: 1px solid rgba(27, 127, 75, 0.12);
            font-weight: 700;
        }

        .muted-box {
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(245, 248, 255, 0.95);
            border: 1px solid rgba(225, 232, 248, 0.95);
            color: var(--subtext);
        }

        .code-line {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 10px;
            background: var(--code-bg);
            color: #3a4d7b;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 0.84rem;
            word-break: break-all;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid rgba(106, 140, 255, 0.18);
            background: rgba(106, 140, 255, 0.12);
            color: #3951c6;
        }

        .button.secondary {
            background: rgba(255, 255, 255, 0.95);
            color: #42506d;
            border-color: rgba(217, 225, 242, 0.95);
        }

        .loading,
        .error-box {
            width: min(900px, calc(100% - 32px));
            margin: 24px auto 48px;
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(217, 225, 242, 0.9);
            box-shadow: var(--shadow);
        }

        .error-box {
            color: #b42318;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 16px;
            margin-top: 28px;
        }

        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 16px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(217, 225, 242, 0.9);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: rgba(106, 140, 255, 0.4);
            text-decoration: none;
        }

        .nav-link.next {
            text-align: right;
        }

        .nav-label {
            font-size: 0.82rem;
            color: var(--subtext);
            font-weight: 600;
        }

        .nav-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-solid);
        }

        .nav-category {
            font-size: 0.8rem;
            color: var(--subtext);
        }

        .nav-placeholder {
            flex: 1;
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .hero-card,
            .main-panel,
            .sidebar {
                padding: 22px;
            }
        }

        @media (max-width: 640px) {
            .hero {
                padding-top: 42px;
            }

            .hero-card,
            .main-panel,
            .sidebar,
            .loading,
            .error-box {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-card">
            <div class="breadcrumb">
                <a href="../../index.html">知识库首页</a>
                <span>→</span>
                <a href="index.html">AI知识总览</a>
                <span>→</span>
                <span id="crumbCurrent">节点详情</span>
            </div>
            <div class="eyebrow" id="heroEyebrow">AI节点详情页</div>
            <h1 id="heroTitle">正在加载节点详情…</h1>
            <p id="heroSummary">这里会展示该节点的简介、定位、关联条目与来源。</p>
            <div id="metaRow" class="meta-row"></div>
        </div>
    </header>

    <main id="app" class="container">
        <div class="loading">正在加载节点内容…</div>
    </main>

    <script>
        const app = document.getElementById('app');
        const heroTitle = document.getElementById('heroTitle');
        const heroSummary = document.getElementById('heroSummary');
        const heroEyebrow = document.getElementById('heroEyebrow');
        const metaRow = document.getElementById('metaRow');
        const crumbCurrent = document.getElementById('crumbCurrent');
        const params = new URLSearchParams(window.location.search);
        const nodeId = params.get('id');
        const RAW_ASSET_BASE = 'https://raw.githubusercontent.com/archili2035/AIKnowledge/main/public/00_AI%E7%9F%A5%E8%AF%86%E6%80%BB%E8%A7%88/';
        const OVERVIEW_PATH = 'overview.json';
        const RELATIONS_PATH = 'relations.json';
        const NODE_DATA_PATH = 'node-data.json';

        let nodeLookup = new Map();
        let categoryLookup = new Map();
        let relationData = [];
        let browseList = [];




        const relationTypeMap = {
            belongs_to: '归属',
            provided_by: '提供方',
            related_to: '相关',
            used_in: '用于',
            competes_with: '竞争/对位',
            depends_on: '依赖'
        };

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseFrontMatter(raw) {
            const result = { tags: [], related: [], sources: [] };
            if (!raw.startsWith('---')) {
                return result;
            }

            const endIndex = raw.indexOf('\n---', 3);
            if (endIndex === -1) {
                return result;
            }

            const content = raw.slice(4, endIndex).split(/\r?\n/);
            let currentKey = '';
            let currentSource = null;

            content.forEach(line => {
                if (!line.trim()) {
                    return;
                }

                const keyMatch = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
                if (keyMatch) {
                    currentKey = keyMatch[1];
                    const value = keyMatch[2].trim();
                    currentSource = null;
                    if (currentKey === 'tags' || currentKey === 'related' || currentKey === 'sources') {
                        if (value && currentKey !== 'sources') {
                            result[currentKey].push(value);
                        }
                    } else {
                        result[currentKey] = value;
                    }
                    return;
                }

                const itemMatch = line.match(/^\s*-\s*(.*)$/);
                if (itemMatch) {
                    const itemValue = itemMatch[1].trim();
                    if (currentKey === 'tags' || currentKey === 'related') {
                        if (itemValue) {
                            result[currentKey].push(itemValue);
                        }
                        return;
                    }
                    if (currentKey === 'sources') {
                        const nameMatch = itemValue.match(/^name:\s*(.*)$/);
                        currentSource = {};
                        if (nameMatch) {
                            currentSource.name = nameMatch[1].trim();
                        } else if (itemValue) {
                            currentSource.name = itemValue;
                        }
                        result.sources.push(currentSource);
                    }
                    return;
                }

                if (currentKey === 'sources') {
                    const urlMatch = line.match(/^\s+url:\s*(.*)$/);
                    if (urlMatch && currentSource) {
                        currentSource.url = urlMatch[1].trim();
                    }
                }
            });

            return result;
        }

        function getMarkdownBody(raw) {
            if (!raw.startsWith('---')) {
                return raw;
            }
            const endIndex = raw.indexOf('\n---', 3);
            if (endIndex === -1) {
                return raw;
            }
            return raw.slice(endIndex + 4).trim();
        }

        function parseSections(body) {
            const regex = /^##\s+(.+)$/gm;
            const matches = [...body.matchAll(regex)];
            if (!matches.length) {
                return [];
            }

            return matches.map((match, index) => {
                const title = match[1].trim();
                const start = match.index + match[0].length;
                const end = index + 1 < matches.length ? matches[index + 1].index : body.length;
                const content = body.slice(start, end).trim();
                return { title, content };
            });
        }

        function stripMarkdown(text) {
            return String(text || '')
                .replace(/\[\[([^\]]+)\]\]/g, '$1')
                .replace(/`([^`]+)`/g, '$1')
                .replace(/^\s*-\s*/gm, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getBestSummary(payload) {
            const candidates = [payload.summary];
            (payload.sections || []).forEach(section => {
                candidates.push(section.content);
            });

            for (const candidate of candidates) {
                const cleaned = stripMarkdown(candidate);
                if (cleaned) {
                    return cleaned;
                }
            }
            return '这里会展示该节点的简介、定位、关联条目与来源。';
        }

        function buildFallbackPayload(node, raw) {
            const frontMatter = parseFrontMatter(raw);
            const sections = parseSections(getMarkdownBody(raw));
            return {
                id: node.id,
                title: frontMatter.title || node.title,
                type: frontMatter.type || node.type || '',
                category: frontMatter.category || node.categoryTitle || '',
                provider: frontMatter.provider || '',
                updated: frontMatter.updated || '',
                confidence: frontMatter.confidence || '',
                tags: frontMatter.tags || [],
                related: frontMatter.related || [],
                sources: frontMatter.sources || [],
                sections,
                summary: stripMarkdown(sections[0]?.content || '')
            };
        }

        async function fetchTextWithFallback(path) {
            const candidates = [path];
            if (window.location.hostname.endsWith('github.io')) {
                candidates.push(RAW_ASSET_BASE + path);
            }

            let lastError = null;
            for (const candidate of candidates) {
                try {
                    const response = await fetch(candidate);
                    if (!response.ok) {
                        throw new Error(candidate + ' -> ' + response.status);
                    }
                    return await response.text();
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error('resource load failed');
        }

        async function fetchJsonWithFallback(path) {
            return JSON.parse(await fetchTextWithFallback(path));
        }

        async function loadNodePayload(node) {
            try {
                const payload = await fetchJsonWithFallback(NODE_DATA_PATH);
                if (payload && payload.nodes && payload.nodes[node.id]) {
                    return payload.nodes[node.id];
                }
            } catch (error) {
                console.warn('node-data.json load failed, fallback to markdown source.', error);
            }

            if (!node.sourcePath) {
                throw new Error('当前节点暂时还没有可读取的详情数据。');
            }

            const raw = await fetchTextWithFallback(node.sourcePath);
            return buildFallbackPayload(node, raw);
        }

        function renderInline(text) {

            let html = escapeHtml(text);
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\[\[([^\]]+)\]\]/g, (_, id) => {
                const node = nodeLookup.get(id);
                if (!node || !node.path) {
                    return '<span>' + escapeHtml(id) + '</span>';
                }
                return '<a href="' + node.path + '">' + escapeHtml(node.title || id) + '</a>';
            });
            return html;
        }

        function renderBlockContent(markdown) {
            const blocks = markdown.split(/\n\s*\n/).filter(Boolean);
            return blocks.map(block => {
                const lines = block.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
                const isList = lines.every(line => line.startsWith('- '));
                if (isList) {
                    const items = lines.map(line => '<li>' + renderInline(line.slice(2)) + '</li>').join('');
                    return '<ul>' + items + '</ul>';
                }
                return '<p>' + renderInline(lines.join(' ')) + '</p>';
            }).join('');
        }

        function createPill(label, value, color) {
            const pill = document.createElement('div');
            pill.className = 'pill';
            if (color) {
                pill.style.borderColor = color + '33';
            }
            pill.innerHTML = '<strong>' + escapeHtml(label) + '</strong><span>' + escapeHtml(value) + '</span>';
            return pill;
        }

        function buildLookups(overview) {
            overview.categories.forEach(category => {
                categoryLookup.set(category.id, category);
                nodeLookup.set(category.id, {
                    id: category.id,
                    title: category.title,
                    type: '分类',
                    color: category.color
                });
                category.children.forEach(child => {
                    nodeLookup.set(child.id, {
                        ...child,
                        categoryId: category.id,
                        categoryTitle: category.title,
                        categoryColor: category.color
                    });
                });
            });

            browseList = [];
            overview.categories.forEach(category => {
                category.children.forEach(child => {
                    if (child.path) {
                        browseList.push({
                            id: child.id,
                            title: child.title,
                            path: child.path,
                            categoryTitle: category.title
                        });
                    }
                });
            });
        }

        function getNodeInfo(id) {
            return nodeLookup.get(id) || { id, title: id, type: '未知对象' };
        }

        function renderTagList(items, className = 'tag-list') {
            if (!items || !items.length) {
                return '<div class="muted-box">当前没有补充这部分信息。</div>';
            }
            const tagClass = className === 'tag-list' ? 'tag' : 'link-chip';
            const html = items.map(item => '<span class="' + tagClass + '">' + escapeHtml(item) + '</span>').join('');
            return '<div class="' + className + '">' + html + '</div>';
        }

        function renderRelatedLinks(relatedIds) {
            if (!relatedIds || !relatedIds.length) {
                return '<div class="muted-box">当前还没有补充相关节点。</div>';
            }

            const html = relatedIds.map(id => {
                const node = getNodeInfo(id);
                if (!node.path) {
                    return '<span class="tag">' + escapeHtml(node.title) + '</span>';
                }
                return '<a class="link-chip" href="' + node.path + '">' + escapeHtml(node.title) + '</a>';
            }).join('');
            return '<div class="link-chip-list">' + html + '</div>';
        }

        function renderSources(sources) {
            if (!sources || !sources.length) {
                return '<div class="muted-box">当前没有补充来源。</div>';
            }

            return '<div class="source-list">' + sources.map(source => {
                const name = escapeHtml(source.name || '未命名来源');
                const url = source.url ? '<p><a href="' + escapeHtml(source.url) + '">' + escapeHtml(source.url) + '</a></p>' : '';
                return '<div class="source-item"><strong>' + name + '</strong>' + url + '</div>';
            }).join('') + '</div>';
        }

        function renderRelations(id) {
            const related = relationData.filter(rel => rel.source === id || rel.target === id);
            if (!related.length) {
                return '<div class="muted-box">当前还没有补充横向关系。</div>';
            }

            return '<div class="relation-list">' + related.map(rel => {
                const source = getNodeInfo(rel.source);
                const target = getNodeInfo(rel.target);
                const other = rel.source === id ? target : source;
                const relationLabel = relationTypeMap[rel.type] || rel.type;
                const jump = other.path ? '<p style="margin-top:8px;"><a href="' + other.path + '">继续查看：' + escapeHtml(other.title) + '</a></p>' : '';
                return '<div class="relation-item"><strong>' + escapeHtml(relationLabel) + ' · ' + escapeHtml(source.title) + ' ↔ ' + escapeHtml(target.title) + '</strong><p>' + escapeHtml(rel.note || '当前没有补充说明。') + '</p>' + jump + '</div>';
            }).join('') + '</div>';
        }

        function renderSections(sections) {
            if (!sections.length) {
                return '<div class="muted-box">当前正文还在整理中。</div>';
            }

            return '<div class="section-grid">' + sections.map(section => {
                return '<section class="section-card"><h2>' + escapeHtml(section.title) + '</h2>' + renderBlockContent(section.content) + '</section>';
            }).join('') + '</div>';
        }

        function renderNavBar(currentId) {
            const index = browseList.findIndex(item => item.id === currentId);
            if (index === -1) return '';

            const prev = index > 0 ? browseList[index - 1] : null;
            const next = index < browseList.length - 1 ? browseList[index + 1] : null;

            let html = '<nav class="nav-bar">';

            if (prev) {
                html += '<a class="nav-link prev" href="' + prev.path + '">'
                    + '<span class="nav-label">← 上一节点</span>'
                    + '<span class="nav-title">' + escapeHtml(prev.title) + '</span>'
                    + '<span class="nav-category">' + escapeHtml(prev.categoryTitle) + '</span>'
                    + '</a>';
            } else {
                html += '<div class="nav-placeholder"></div>';
            }

            if (next) {
                html += '<a class="nav-link next" href="' + next.path + '">'
                    + '<span class="nav-label">下一节点 →</span>'
                    + '<span class="nav-title">' + escapeHtml(next.title) + '</span>'
                    + '<span class="nav-category">' + escapeHtml(next.categoryTitle) + '</span>'
                    + '</a>';
            } else {
                html += '<div class="nav-placeholder"></div>';
            }

            html += '</nav>';
            return html;
        }

        function renderPage(node, payload) {
            const category = categoryLookup.get(node.categoryId);
            const displayTitle = payload.title || node.title;
            const typeLabel = payload.type || node.type || '节点';
            const categoryLabel = payload.category || node.categoryTitle || '未标注';
            const summaryText = getBestSummary(payload);
            const sectionHtml = renderSections(payload.sections || []);
            const tagHtml = renderTagList(payload.tags || []);
            const relatedHtml = renderRelatedLinks(payload.related || []);
            const sourceHtml = renderSources(payload.sources || []);
            const relationHtml = renderRelations(node.id);

            document.title = displayTitle + '｜AI节点详情';
            heroTitle.textContent = displayTitle;
            heroSummary.textContent = summaryText;
            heroEyebrow.textContent = (node.categoryTitle || categoryLabel || 'AI知识总览') + ' · ' + typeLabel;
            crumbCurrent.textContent = displayTitle;
            metaRow.innerHTML = '';
            metaRow.appendChild(createPill('类型', typeLabel, category?.color));
            metaRow.appendChild(createPill('分类', categoryLabel, category?.color));
            if (payload.provider) {
                metaRow.appendChild(createPill('相关主体', payload.provider));
            }
            if (payload.updated) {
                metaRow.appendChild(createPill('更新', payload.updated));
            }
            if (payload.confidence) {
                metaRow.appendChild(createPill('置信度', payload.confidence));
            }

            const navHtml = renderNavBar(node.id);

            app.innerHTML = `
                <div class="layout">
                    <article class="panel main-panel">
                        ${sectionHtml}
                    </article>
                    <aside class="panel sidebar">
                        <section class="section-card">
                            <h3>标签</h3>
                            ${tagHtml}
                        </section>

                        <section class="section-card">
                            <h3>相关节点</h3>
                            ${relatedHtml}
                        </section>

                        <section class="section-card">
                            <h3>横向关系</h3>
                            ${relationHtml}
                        </section>

                        <section class="section-card">
                            <h3>来源</h3>
                            ${sourceHtml}
                        </section>

                        <section class="section-card">
                            <h3>继续浏览</h3>
                            <div class="actions">
                                <a class="button" href="index.html">返回 AI 知识总览</a>
                                <a class="button secondary" href="../../index.html">返回知识库首页</a>
                            </div>
                        </section>
                    </aside>
                </div>
                ${navHtml}
            `;
        }


        function renderError(message) {
            document.title = '节点详情加载失败';
            heroTitle.textContent = '节点详情加载失败';
            heroSummary.textContent = message;
            heroEyebrow.textContent = 'AI节点详情页';
            crumbCurrent.textContent = '加载失败';
            metaRow.innerHTML = '';
            app.innerHTML = '<div class="error-box">' + escapeHtml(message) + '</div>';
        }

        async function init() {
            if (!nodeId) {
                renderError('当前没有提供节点 id。请从 AI 知识总览页点击节点进入。');
                return;
            }

            try {
                const [overviewPayload, relationPayload] = await Promise.all([
                    fetchJsonWithFallback(OVERVIEW_PATH),
                    fetchJsonWithFallback(RELATIONS_PATH).catch(() => ({ relations: [] }))
                ]);

                relationData = Array.isArray(relationPayload.relations) ? relationPayload.relations : [];
                buildLookups(overviewPayload);

                const node = nodeLookup.get(nodeId);
                if (!node) {
                    throw new Error('没有找到对应节点，请从 AI 知识总览页重新进入。');
                }

                const payload = await loadNodePayload(node);
                renderPage(node, payload);
            } catch (error) {
                renderError(error.message || '节点详情加载失败，请稍后重试。');
            }
        }

        init();

    </script>
</body>
</html>
